<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <h1>Tic Tac Toe</h1>
    <div class="container">
      <div class="div-button" id="div-item-1"></div>
      <div class="div-button" id="div-item-2"></div>
      <div class="div-button" id="div-item-3"></div>
      <div class="div-button" id="div-item-4"></div>
      <div class="div-button" id="div-item-5"></div>
      <div class="div-button" id="div-item-6"></div>
      <div class="div-button" id="div-item-7"></div>
      <div class="div-button" id="div-item-8"></div>
      <div class="div-button" id="div-item-9"></div>
    </div>

    <div class="popup-div">
      <font id="winner-text"></font>
      <button id="ok-button" onclick="hideDiv()">OK</button>
    </div>
    <div class="current-turn">
      Current Turn : <font id="current-turn-text">X</font>
    </div>
  </body>
</html>
